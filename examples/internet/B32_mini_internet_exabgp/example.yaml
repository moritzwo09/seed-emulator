id: internet-b32-mini-internet-exabgp
name: Mini Internet With ExaBGP Speaker
description: B00 mini Internet with an AS180 ExaBGP speaker attached to IX100 and peering with AS2.
runner: internet
script: mini_internet_exabgp.py
platform: amd
features:
  - ipv4-default
  - mini-internet
  - exabgp-service
  - ebgp-route-server
  - ebgp-private-peering
  - ibgp
  - ospf

compile:
  enabled: true
  output: output
  clean:
    - output
  expected:
    - output/docker-compose.yml
  timeout: 600

build:
  enabled: true
  timeout: 1800

runtime:
  compose: output/docker-compose.yml
  readiness:
    - name: representative B32 services are running
      type: compose-ps
      services:
        - brdnode_2_r100
        - brdnode_2_r101
        - brdnode_3_r103
        - brdnode_4_r104
        - brdnode_150_router0
        - brdnode_152_router0
        - hnode_150_host_0
        - hnode_152_host_0
        - hnode_180_exabgp
      retries: 40
      interval: 3

probes:
  - name: ExaBGP speaker reaches AS2 router on IX100
    type: ping
    service: hnode_180_exabgp
    target: 10.100.0.2
    count: 3
    retries: 40
    interval: 5

  - name: AS150 reaches AS152 across the mini Internet
    type: ping
    service: hnode_150_host_0
    target: 10.152.0.71
    count: 3
    retries: 40
    interval: 5

test_programs:
  - name: B32 ExaBGP runtime validation
    script: test_runtime.py
    timeout: 240
