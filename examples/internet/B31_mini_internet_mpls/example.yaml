id: internet-b31-mini-internet-mpls
name: Mini Internet With MPLS Transit AS
description: B00-style mini Internet where AS2 uses MPLS while the other ASes keep normal routing.
runner: internet
script: mini_internet_mpls.py
platform: amd
features:
  - ipv4-default
  - mini-internet
  - mpls
  - ebgp-route-server
  - ebgp-private-peering
  - ibgp
  - ospf

compile:
  enabled: true
  output: output
  clean:
    - output
  expected:
    - output/docker-compose.yml
  timeout: 600

build:
  enabled: true
  timeout: 1800

runtime:
  compose: output/docker-compose.yml
  readiness:
    - name: representative B31 services are running
      type: compose-ps
      services:
        - brdnode_2_r100
        - brdnode_2_r101
        - brdnode_2_r102
        - brdnode_2_r105
        - rnode_2_core_100_101
        - rnode_2_core_101_102
        - rnode_2_core_100_105
        - brdnode_3_r103
        - brdnode_4_r104
        - brdnode_11_r102
        - brdnode_12_r101
        - brdnode_150_router0
        - brdnode_152_router0
        - brdnode_160_router0
        - brdnode_171_router0
        - hnode_150_host_0
        - hnode_152_host_0
        - hnode_160_host_0
        - hnode_171_host_0
      retries: 40
      interval: 3

probes:
  - name: AS150 reaches AS152 through MPLS-enabled AS2
    type: ping
    service: hnode_150_host_0
    target: 10.152.0.71
    count: 3
    retries: 40
    interval: 5

  - name: AS150 reaches AS160 while non-MPLS AS3 remains unchanged
    type: ping
    service: hnode_150_host_0
    target: 10.160.0.71
    count: 3
    retries: 40
    interval: 5

  - name: AS171 reaches AS154 customized host
    type: ping
    service: hnode_171_host_0
    target: 10.154.0.129
    count: 3
    retries: 40
    interval: 5

test_programs:
  - name: B31 MPLS runtime validation
    script: test_runtime.py
    timeout: 240
