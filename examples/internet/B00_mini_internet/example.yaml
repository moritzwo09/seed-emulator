id: internet-b00-mini-internet
name: Mini Internet
description: A reusable mini-Internet topology with transit ASes, route-server peerings, and stub ASes.
runner: internet
script: mini_internet.py
platform: amd
features:
  - ipv4-default
  - mini-internet
  - ebgp-route-server
  - ebgp-private-peering
  - ibgp
  - ospf

compile:
  enabled: true
  output: output
  clean:
    - output
  expected:
    - output/docker-compose.yml
  timeout: 600

build:
  enabled: true
  timeout: 1800

runtime:
  compose: output/docker-compose.yml
  readiness:
    - name: representative B00 services are running
      type: compose-ps
      services:
        - brdnode_2_r100
        - brdnode_2_r101
        - brdnode_3_r103
        - brdnode_4_r104
        - brdnode_11_r102
        - brdnode_12_r101
        - brdnode_150_router0
        - brdnode_152_router0
        - brdnode_160_router0
        - brdnode_171_router0
        - hnode_150_host_0
        - hnode_152_host_0
        - hnode_160_host_0
        - hnode_171_host_0
      retries: 40
      interval: 3

probes:
  - name: AS150 reaches AS152 across tier-1 and tier-2 transit
    type: ping
    service: hnode_150_host_0
    target: 10.152.0.71
    count: 3
    retries: 40
    interval: 5

  - name: AS150 reaches AS160 through AS3
    type: ping
    service: hnode_150_host_0
    target: 10.160.0.71
    count: 3
    retries: 40
    interval: 5

  - name: AS171 reaches AS154 customized host
    type: ping
    service: hnode_171_host_0
    target: 10.154.0.129
    count: 3
    retries: 40
    interval: 5

test_programs:
  - name: B00 custom runtime validation
    script: test_runtime.py
    timeout: 240
