id: internet-b03-hybrid-internet
name: Hybrid Internet
description: A B00-based mini Internet extended with real-world routers and OpenVPN remote access.
runner: internet
script: hybrid_internet.py
platform: amd
features:
  - ipv4-default
  - mini-internet
  - real-world-router
  - default-real-world-gateway
  - openvpn-remote-access
  - ebgp-private-peering
  - ibgp
  - ospf

compile:
  enabled: true
  output: output
  clean:
    - output
  expected:
    - output/docker-compose.yml
  timeout: 600

build:
  enabled: true
  timeout: 1800

runtime:
  compose: output/docker-compose.yml
  readiness:
    - name: B03 representative services are running
      type: compose-ps
      services:
        - hnode_150_host_0
        - hnode_152_host_0
        - hnode_154_host_new
        - hnode_170_host_0
        - brdnode_11872_rw-11872-syr
        - brdnode_99999_rw-real-world
      retries: 40
      interval: 3

probes:
  - name: AS150 reaches AS152 through the B00 base Internet
    type: ping
    service: hnode_150_host_0
    target: 10.152.0.71
    count: 3
    retries: 40
    interval: 5
    timeout: 45

  - name: AS170 reaches AS154 through the B00 base Internet
    type: ping
    service: hnode_170_host_0
    target: 10.154.0.129
    count: 3
    retries: 40
    interval: 5
    timeout: 45

test_programs:
  - name: B03 hybrid Internet structural validation
    script: test_runtime.py
    timeout: 300
