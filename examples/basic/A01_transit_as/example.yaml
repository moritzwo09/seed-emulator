id: basic-a01-transit-as
name: Transit AS
description: A transit-AS example with AS2 carrying traffic between stub ASes on IX100 and IX101.
runner: internet
script: transit_as.py
platform: amd
features:
  - ipv4-default
  - transit-as
  - ebgp-private-peering
  - ibgp
  - ospf

compile:
  enabled: true
  output: output
  clean:
    - output
    - base_component.bin
  expected:
    - output/docker-compose.yml
  timeout: 300

build:
  enabled: true
  timeout: 1200

runtime:
  compose: output/docker-compose.yml
  readiness:
    - name: transit AS services are running
      type: compose-ps
      services:
        - brdnode_2_r1
        - rnode_2_r2
        - rnode_2_r3
        - brdnode_2_r4
        - brdnode_151_router0
        - brdnode_152_router0
        - brdnode_153_router0
        - hnode_151_host0
        - hnode_152_host0
        - hnode_153_host0
      retries: 30
      interval: 2

probes:
  - name: AS151 reaches AS152 through transit AS2
    type: ping
    service: hnode_151_host0
    target: 10.152.0.71
    count: 3
    retries: 30
    interval: 5

  - name: AS151 reaches AS153 through transit AS2
    type: ping
    service: hnode_151_host0
    target: 10.153.0.71
    count: 3
    retries: 30
    interval: 5

  - name: AS152 reaches AS151 through transit AS2
    type: ping
    service: hnode_152_host0
    target: 10.151.0.71
    count: 3
    retries: 30
    interval: 5

test_programs:
  - name: A01 transit AS runtime validation
    script: test_runtime.py
    timeout: 180
