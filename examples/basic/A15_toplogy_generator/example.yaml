id: basic-a15-topology-generator
name: Transit AS Topology Generator
description: Demonstrates NetworkX-based random transit AS topology generation with CLI controls.
runner: internet
script: topology_generator.py
platform: amd
features:
  - ipv4-default
  - topology-generator
  - networkx
  - ebgp-private-peering
  - ibgp
  - ospf

compile:
  enabled: true
  output: output
  clean:
    - output
  expected:
    - output/docker-compose.yml
    - output/topology.json
  timeout: 300

build:
  enabled: true
  timeout: 1200

runtime:
  compose: output/docker-compose.yml
  readiness:
    - name: A15 generated topology services are running
      type: compose-ps
      services:
        - brdnode_2_r100
        - brdnode_2_r101
        - brdnode_2_r102
        - rnode_2_core0
        - rnode_2_core1
        - brdnode_150_router0
        - brdnode_151_router0
        - brdnode_152_router0
        - hnode_150_host_0
        - hnode_152_host_0
      retries: 30
      interval: 3

probes:
  - name: AS150 reaches AS152 through generated AS2 transit topology
    type: ping
    service: hnode_150_host_0
    target: 10.152.0.71
    count: 3
    retries: 30
    interval: 5

test_programs:
  - name: A15 generated topology runtime validation
    script: test_runtime.py
    timeout: 240
