id: basic-a62-route-reflector
name: Route Reflector Mini Internet
description: A B00-style mini Internet that demonstrates legacy full-mesh iBGP, one-RR, and two-RR Route Reflector modes.
runner: internet
script: route_reflector.py
platform: amd
features:
  - ipv4-default
  - mini-internet
  - ebgp-route-server
  - ebgp-private-peering
  - ibgp
  - ibgp-route-reflector
  - ospf

compile:
  enabled: true
  output: output
  clean:
    - output
  expected:
    - output/docker-compose.yml
  timeout: 600

build:
  enabled: true
  timeout: 1800

runtime:
  compose: output/docker-compose.yml
  readiness:
    - name: representative A62 services are running
      type: compose-ps
      services:
        - brdnode_2_r100
        - brdnode_2_r101
        - brdnode_2_r102
        - brdnode_2_r105
        - brdnode_3_r100
        - brdnode_3_r103
        - brdnode_3_r104
        - brdnode_3_r105
        - brdnode_12_r101
        - brdnode_12_r104
        - brdnode_150_router0
        - brdnode_152_router0
        - brdnode_160_router0
        - brdnode_171_router0
        - hnode_150_host_0
        - hnode_152_host_0
        - hnode_160_host_0
        - hnode_171_host_0
      retries: 40
      interval: 3

probes:
  - name: AS12 RR config contains the cluster ID
    type: exec
    service: brdnode_12_r101
    command: grep -q 'rr cluster id 10.12.0.1' /etc/bird/bird.conf
    expect_exit: 0
    retries: 10
    interval: 3

  - name: AS3 RR mesh config is generated
    type: exec
    service: brdnode_3_r100
    command: grep -q 'protocol bgp Ibgp_rr_mesh_r103' /etc/bird/bird.conf
    expect_exit: 0
    retries: 10
    interval: 3

  - name: AS150 reaches AS152 across the RR mini Internet
    type: ping
    service: hnode_150_host_0
    target: 10.152.0.71
    count: 3
    retries: 40
    interval: 5

  - name: AS150 reaches AS160 through AS3 RR clusters
    type: ping
    service: hnode_150_host_0
    target: 10.160.0.71
    count: 3
    retries: 40
    interval: 5

  - name: AS171 reaches AS154 across transit ASes
    type: ping
    service: hnode_171_host_0
    target: 10.154.0.71
    count: 3
    retries: 40
    interval: 5

test_programs:
  - name: A62 custom runtime validation
    script: test_runtime.py
    timeout: 1200
