id: basic-a62-route-reflector
name: Route Reflector Mini Internet
description: A B00-style mini Internet that demonstrates legacy full-mesh iBGP, one-RR, and two-RR Route Reflector modes.
runner: internet
script: route_reflector.py
platform: amd
features:
  - ipv4-default
  - mini-internet
  - ebgp-route-server
  - ebgp-private-peering
  - ibgp
  - ibgp-route-reflector
  - ospf

compile:
  enabled: true
  output: output
  clean:
    - output
  expected:
    - output/docker-compose.yml
  timeout: 600

build:
  enabled: true
  timeout: 1800

runtime:
  compose: output/docker-compose.yml
  readiness:
    - name: A62 services used by runtime checks are running
      type: compose-ps
      services:
        - brdnode_2_r100
        - brdnode_2_r101
        - brdnode_2_r102
        - brdnode_2_r105
        - brdnode_3_r100
        - brdnode_3_r103
        - brdnode_3_r104
        - brdnode_3_r105
        - brdnode_4_r100
        - brdnode_4_r102
        - brdnode_4_r104
        - brdnode_11_r102
        - brdnode_11_r105
        - brdnode_12_r101
        - brdnode_12_r104
        - brdnode_150_router0
        - brdnode_151_router0
        - brdnode_152_router0
        - brdnode_153_router0
        - brdnode_154_router0
        - brdnode_160_router0
        - brdnode_161_router0
        - brdnode_162_router0
        - brdnode_163_router0
        - brdnode_164_router0
        - brdnode_170_router0
        - brdnode_171_router0
        - hnode_150_host_0
        - hnode_152_host_0
        - hnode_154_host_0
        - hnode_160_host_0
        - hnode_171_host_0
      retries: 40
      interval: 3

probes:
  - name: AS150 reaches AS152 across the RR mini Internet
    type: ping
    service: hnode_150_host_0
    target: 10.152.0.71
    count: 3
    retries: 40
    interval: 5
    timeout: 45

  - name: AS152 reaches AS150 across the RR mini Internet
    type: ping
    service: hnode_152_host_0
    target: 10.150.0.71
    count: 3
    retries: 40
    interval: 5
    timeout: 45

  - name: AS150 reaches AS160 through AS3 RR clusters
    type: ping
    service: hnode_150_host_0
    target: 10.160.0.71
    count: 3
    retries: 40
    interval: 5
    timeout: 45

  - name: AS160 reaches AS150 through AS3 RR clusters
    type: ping
    service: hnode_160_host_0
    target: 10.150.0.71
    count: 3
    retries: 40
    interval: 5
    timeout: 45

  - name: AS171 reaches AS154 across transit ASes
    type: ping
    service: hnode_171_host_0
    target: 10.154.0.71
    count: 3
    retries: 40
    interval: 5
    timeout: 45

  - name: AS154 reaches AS171 across transit ASes
    type: ping
    service: hnode_154_host_0
    target: 10.171.0.71
    count: 3
    retries: 40
    interval: 5
    timeout: 45

test_programs:
  - name: A62 custom runtime validation
    script: test_runtime.py
    timeout: 1200
