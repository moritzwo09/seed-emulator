id: blockchain-d10-eth-explorer
name: Ethereum PoS Private Chain with EthExplorer
description: A D01-style Ethereum proof-of-stake private chain with the EthExplorer visualization enabled and tested.
runner: blockchain
script: ethereum_pos.py
platform: amd
features:
  - ethereum-pos
  - geth
  - lighthouse
  - validators-at-genesis
  - ethereum-transaction
  - eth-explorer

compile:
  enabled: true
  output: output
  clean:
    - output
  expected:
    - output/docker-compose.yml
  timeout: 1800

build:
  enabled: true
  timeout: 3600

runtime:
  compose: output/docker-compose.yml
  readiness:
    - name: D10 Geth execution nodes are running
      type: ethereum-compose-ps
      class_contains: Ethereum-POS-Geth
      consensus: POS
      expected_count: 3
      retries: 60
      interval: 3

    - name: D10 Lighthouse beacon nodes are running
      type: ethereum-compose-ps
      class_contains: Ethereum-POS-Beacon
      consensus: POS
      expected_count: 3
      retries: 60
      interval: 3

    - name: D10 genesis validator clients are running
      type: ethereum-compose-ps
      class_contains: Ethereum-POS-Validator
      role: validator_at_genesis
      consensus: POS
      expected_count: 9
      retries: 60
      interval: 3

    - name: D10 beacon setup service is running
      type: ethereum-compose-ps
      display_contains: Ethereum-POS-BeaconSetup
      expected_count: 1
      retries: 60
      interval: 3

    - name: D10 Faucet service is running
      type: ethereum-compose-ps
      class_contains: FaucetService
      expected_count: 1
      retries: 60
      interval: 3

    - name: D10 Utility service is running
      type: ethereum-compose-ps
      class_contains: EthUtilityServer
      expected_count: 1
      retries: 60
      interval: 3

    - name: D10 EthExplorer services are running
      type: compose-ps
      services:
        - clickhouse
        - postgres
        - alloy
        - redis
        - littlebigtable
        - rawbigtable
        - seedemu-ethexplorer-backend
        - seedemu-ethexplorer-web
      retries: 90
      interval: 5


    - name: D10 EthExplorer homepage is ready
      type: http
      url: http://127.0.0.1:5000/
      retries: 90
      interval: 5
      timeout: 10

probes:
  - name: D10 Geth process is active
    type: ethereum-exec
    class_contains: Ethereum-POS-Geth
    consensus: POS
    command: pgrep geth >/dev/null
    retries: 30
    interval: 3

  - name: D10 Lighthouse beacon process is active
    type: ethereum-exec
    class_contains: Ethereum-POS-Beacon
    consensus: POS
    command: "pgrep -af 'lighthouse.* bn ' >/dev/null"
    retries: 30
    interval: 3

  - name: D10 Lighthouse validator process is active
    type: ethereum-exec
    class_contains: Ethereum-POS-Validator
    role: validator_at_genesis
    consensus: POS
    command: "pgrep -af 'lighthouse.* vc ' >/dev/null"
    retries: 30
    interval: 3

  - name: D10 beacon setup produced genesis state
    type: ethereum-exec
    display_contains: Ethereum-POS-BeaconSetup
    command: test -s /local-testnet/testnet/genesis.ssz
    retries: 30
    interval: 3

  - name: D10 Geth IPC exposes a funded local account
    type: ethereum-exec
    class_contains: Ethereum-POS-Geth
    consensus: POS
    command: "geth attach --exec 'eth.accounts.length > 0' | grep -q true"
    retries: 30
    interval: 3

  - name: D10 PoS chain produces execution blocks
    type: ethereum-block-progress
    class_contains: Ethereum-POS-Geth
    consensus: POS
    min_delta: 1
    block_retries: 60
    block_interval: 5
    timeout: 60

  - name: D10 EthExplorer API docs are reachable
    type: http
    url: http://127.0.0.1:5000/api/v1/docs
    retries: 30
    interval: 5
    timeout: 10

  - name: D10 EthExplorer latest-state API is reachable
    type: http
    url: http://127.0.0.1:5000/api/v1/latestState
    expect_body_regex: "(?i)(slot|epoch|head|finalized)"
    retries: 90
    interval: 5
    timeout: 10

test_programs:
  - name: D10 Ethereum transaction and EthExplorer validation
    script: test_runtime.py
    timeout: 1500
