id: blockchain-d23-validator-at-running
name: Ethereum PoS Validator At Running
runner: blockchain
script: validator.py
platform: amd
features:
  - ethereum-pos
  - geth
  - lighthouse
  - validators-at-genesis
  - validator-at-running
  - ethereum-deposit

compile:
  enabled: true
  output: output
  args:
    - --no-ether-view
  clean:
    - output
  expected:
    - output/docker-compose.yml
  timeout: 1800

build:
  enabled: true
  timeout: 3600

ci:
  test_program_command: test

runtime:
  compose: output/docker-compose.yml
  readiness:
    - name: D23 POS Geth execution nodes are running
      type: ethereum-compose-ps
      class_contains: Ethereum-POS-Geth
      consensus: POS
      expected_count: 3
      retries: 60
      interval: 3

    - name: D23 POS Lighthouse beacon nodes are running
      type: ethereum-compose-ps
      class_contains: Ethereum-POS-Beacon
      consensus: POS
      expected_count: 3
      retries: 60
      interval: 3

    - name: D23 POS genesis validator clients are running
      type: ethereum-compose-ps
      class_contains: Ethereum-POS-Validator
      role: validator_at_genesis
      consensus: POS
      expected_count: 9
      retries: 60
      interval: 3

    - name: D23 validator-at-running service is running
      type: ethereum-compose-ps
      class_contains: Ethereum-POS-Validator-AtRunning
      role: validator_at_running
      consensus: POS
      expected_count: 1
      retries: 60
      interval: 3

    - name: D23 POS beacon setup service is running
      type: ethereum-compose-ps
      display_contains: Ethereum-POS-BeaconSetup
      expected_count: 1
      retries: 60
      interval: 3

    - name: D23 Faucet service is running
      type: ethereum-compose-ps
      class_contains: FaucetService
      expected_count: 1
      retries: 60
      interval: 3

    - name: D23 Utility service is running
      type: ethereum-compose-ps
      class_contains: EthUtilityServer
      expected_count: 1
      retries: 60
      interval: 3

probes:
  - name: D23 POS Geth process is active
    type: ethereum-exec
    class_contains: Ethereum-POS-Geth
    consensus: POS
    command: pgrep geth >/dev/null
    retries: 30
    interval: 3

  - name: D23 POS Lighthouse beacon process is active
    type: ethereum-exec
    class_contains: Ethereum-POS-Beacon
    consensus: POS
    command: "pgrep -af 'lighthouse.* bn ' >/dev/null"
    retries: 30
    interval: 3

  - name: D23 POS genesis Lighthouse validator process is active
    type: ethereum-exec
    class_contains: Ethereum-POS-Validator
    role: validator_at_genesis
    consensus: POS
    command: "pgrep -af 'lighthouse.* vc ' >/dev/null"
    retries: 30
    interval: 3

  - name: D23 POS beacon setup produced genesis state
    type: ethereum-exec
    display_contains: Ethereum-POS-BeaconSetup
    command: test -s /local-testnet/testnet/genesis.ssz
    retries: 30
    interval: 3

  - name: D23 validator-at-running node received testnet files
    type: ethereum-exec
    class_contains: Ethereum-POS-Validator-AtRunning
    role: validator_at_running
    consensus: POS
    command: test -s /tmp/withdraw-address && test -s /tmp/seed.pass && test -s /tmp/vc/local-testnet/testnet/genesis.ssz
    retries: 60
    interval: 3

  - name: D23 Geth IPC exposes a funded local account
    type: ethereum-exec
    class_contains: Ethereum-POS-Geth
    consensus: POS
    command: "geth attach --exec 'eth.accounts.length > 0' | grep -q true"
    retries: 30
    interval: 3

  - name: D23 deposit contract bytecode exists
    type: ethereum-exec
    class_contains: Ethereum-POS-Geth
    consensus: POS
    command: >-
      geth attach --exec 'eth.getCode("0x00000000219ab540356cBB839Cbe05303d7705Fa").length > 2' | grep -q true
    retries: 30
    interval: 3

  - name: D23 POS chain produces execution blocks
    type: ethereum-block-progress
    class_contains: Ethereum-POS-Geth
    consensus: POS
    min_delta: 1
    block_retries: 60
    block_interval: 5
    timeout: 60

test_programs:
  - name: D23 validator-at-running validation
    script: test_runtime.py
    timeout: 9600
