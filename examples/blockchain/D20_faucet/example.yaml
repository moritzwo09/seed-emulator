id: blockchain-d20-faucet-pos
name: Ethereum PoS Faucet
description: A D01-style Ethereum proof-of-stake chain with Faucet build-time and runtime funding tests.
runner: blockchain
script: faucet.py
platform: amd
features:
  - ethereum-pos
  - geth
  - lighthouse
  - validators-at-genesis
  - faucet
  - faucet-user

compile:
  enabled: true
  output: output
  args:
    - --consensus
    - pos
    - --no-ether-view
  clean:
    - output
  expected:
    - output/docker-compose.yml
  timeout: 1800

build:
  enabled: true
  timeout: 3600

runtime:
  compose: output/docker-compose.yml
  readiness:
    - name: D20 POS Geth execution nodes are running
      type: ethereum-compose-ps
      class_contains: Ethereum-POS-Geth
      consensus: POS
      expected_count: 3
      retries: 60
      interval: 3

    - name: D20 POS Lighthouse beacon nodes are running
      type: ethereum-compose-ps
      class_contains: Ethereum-POS-Beacon
      consensus: POS
      expected_count: 3
      retries: 60
      interval: 3

    - name: D20 POS genesis validator clients are running
      type: ethereum-compose-ps
      class_contains: Ethereum-POS-Validator
      role: validator_at_genesis
      consensus: POS
      expected_count: 9
      retries: 60
      interval: 3

    - name: D20 POS beacon setup service is running
      type: ethereum-compose-ps
      display_contains: Ethereum-POS-BeaconSetup
      expected_count: 1
      retries: 60
      interval: 3

    - name: D20 Faucet service is running
      type: ethereum-compose-ps
      class_contains: FaucetService
      expected_count: 1
      retries: 60
      interval: 3

    - name: D20 Faucet user service is running
      type: ethereum-compose-ps
      class_contains: FaucetUserService
      expected_count: 1
      retries: 60
      interval: 3

    - name: D20 Utility service is running
      type: ethereum-compose-ps
      class_contains: EthUtilityServer
      expected_count: 1
      retries: 60
      interval: 3

probes:
  - name: D20 POS Geth process is active
    type: ethereum-exec
    class_contains: Ethereum-POS-Geth
    consensus: POS
    command: pgrep geth >/dev/null
    retries: 30
    interval: 3

  - name: D20 POS Lighthouse beacon process is active
    type: ethereum-exec
    class_contains: Ethereum-POS-Beacon
    consensus: POS
    command: "pgrep -af 'lighthouse.* bn ' >/dev/null"
    retries: 30
    interval: 3

  - name: D20 POS Lighthouse validator process is active
    type: ethereum-exec
    class_contains: Ethereum-POS-Validator
    role: validator_at_genesis
    consensus: POS
    command: "pgrep -af 'lighthouse.* vc ' >/dev/null"
    retries: 30
    interval: 3

  - name: D20 POS beacon setup produced genesis state
    type: ethereum-exec
    display_contains: Ethereum-POS-BeaconSetup
    command: test -s /local-testnet/testnet/genesis.ssz
    retries: 30
    interval: 3

  - name: D20 Faucet HTTP health endpoint returns OK
    type: ethereum-exec
    class_contains: FaucetService
    command: >-
      python3 -c 'import urllib.request; print(urllib.request.urlopen("http://127.0.0.1:80/", timeout=5).read().decode())' | grep -q '^OK$'
    retries: 60
    interval: 5
    timeout: 15

  - name: D20 POS chain produces execution blocks
    type: ethereum-block-progress
    class_contains: Ethereum-POS-Geth
    consensus: POS
    min_delta: 1
    block_retries: 60
    block_interval: 5
    timeout: 60

test_programs:
  - name: D20 POS Faucet funding validation
    script: test_runtime.py
    timeout: 1800
