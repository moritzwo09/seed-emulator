id: blockchain-d01-ethereum-pos
name: Ethereum PoS Private Chain
description: A private Ethereum proof-of-stake chain with Geth execution nodes, Lighthouse beacon nodes, genesis validators, Faucet, and Utility services.
runner: blockchain
script: ethereum_pos.py
platform: amd
features:
  - ethereum-pos
  - geth
  - lighthouse
  - validators-at-genesis
  - ethereum-transaction

compile:
  enabled: true
  output: output
  clean:
    - output
  expected:
    - output/docker-compose.yml
  timeout: 1800

build:
  enabled: true
  timeout: 3600

runtime:
  compose: output/docker-compose.yml
  readiness:
    - name: D01 Geth execution nodes are running
      type: ethereum-compose-ps
      class_contains: Ethereum-POS-Geth
      consensus: POS
      expected_count: 3
      retries: 60
      interval: 3

    - name: D01 Lighthouse beacon nodes are running
      type: ethereum-compose-ps
      class_contains: Ethereum-POS-Beacon
      consensus: POS
      expected_count: 3
      retries: 60
      interval: 3

    - name: D01 genesis validator clients are running
      type: ethereum-compose-ps
      class_contains: Ethereum-POS-Validator
      role: validator_at_genesis
      consensus: POS
      expected_count: 9
      retries: 60
      interval: 3

    - name: D01 beacon setup service is running
      type: ethereum-compose-ps
      display_contains: Ethereum-POS-BeaconSetup
      expected_count: 1
      retries: 60
      interval: 3

    - name: D01 Faucet service is running
      type: ethereum-compose-ps
      class_contains: FaucetService
      expected_count: 1
      retries: 60
      interval: 3

    - name: D01 Utility service is running
      type: ethereum-compose-ps
      class_contains: EthUtilityServer
      expected_count: 1
      retries: 60
      interval: 3

probes:
  - name: Geth process is active
    type: ethereum-exec
    class_contains: Ethereum-POS-Geth
    consensus: POS
    command: pgrep geth >/dev/null
    retries: 30
    interval: 3

  - name: Lighthouse beacon process is active
    type: ethereum-exec
    class_contains: Ethereum-POS-Beacon
    consensus: POS
    command: "pgrep -af 'lighthouse.* bn ' >/dev/null"
    retries: 30
    interval: 3

  - name: Lighthouse validator process is active
    type: ethereum-exec
    class_contains: Ethereum-POS-Validator
    role: validator_at_genesis
    consensus: POS
    command: "pgrep -af 'lighthouse.* vc ' >/dev/null"
    retries: 30
    interval: 3

  - name: Beacon setup produced genesis state
    type: ethereum-exec
    display_contains: Ethereum-POS-BeaconSetup
    command: test -s /local-testnet/testnet/genesis.ssz
    retries: 30
    interval: 3

  - name: Geth IPC exposes a funded local account
    type: ethereum-exec
    class_contains: Ethereum-POS-Geth
    consensus: POS
    command: "geth attach --exec 'eth.accounts.length > 0' | grep -q true"
    retries: 30
    interval: 3

  - name: PoS chain produces execution blocks
    type: ethereum-block-progress
    class_contains: Ethereum-POS-Geth
    consensus: POS
    min_delta: 1
    block_retries: 60
    block_interval: 5
    timeout: 60

test_programs:
  - name: D01 Ethereum transaction validation
    script: test_runtime.py
    timeout: 900
